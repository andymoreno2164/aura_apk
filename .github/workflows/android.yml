name: Build APK

on:
 push:
 workflow_dispatch:

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
   - name: Checkout repository
     uses: actions/checkout@v4

   - name: Build with Buildozer
     uses: ArtemSBulgakov/buildozer-action@v2

   - name: Upload APK
     uses: actions/upload-artifact@v4
     with:
      name: aura-apk
      path: bin/*.apk
